<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dora AI Assistant</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
padding-top:100px;
}

h1{
font-size:40px;
color:#38bdf8;
}

button{
padding:15px 40px;
font-size:18px;
border:none;
border-radius:10px;
background:#38bdf8;
color:black;
cursor:pointer;
margin-top:30px;
}

button:hover{
background:#0ea5e9;
}

#status{
margin-top:20px;
font-size:18px;
color:#94a3b8;
}

</style>
</head>

<body>

<h1>Dora AI Assistant</h1>

<p>Your personal AI assistant</p>

<button onclick="startListening()">🎤 Activate Dora</button>

<div id="status">Status: Idle</div>

<script>

const status = document.getElementById("status")

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.lang = "en-US"

function speak(text){

const speech = new SpeechSynthesisUtterance(text)

speech.rate = 1
speech.pitch = 1

window.speechSynthesis.speak(speech)

}

function startListening(){

status.innerText = "Listening..."

recognition.start()

}

recognition.onresult = function(event){

const command = event.results[0][0].transcript.toLowerCase()

status.innerText = "Command: " + command

handleCommand(command)

}

function handleCommand(command){

if(command.includes("hey dora")){

speak("Hello Boss, how can I assist you today?")

}

else if(command.includes("open youtube")){

speak("Opening YouTube now, Boss")

window.open("https://youtube.com","_blank")

}

else if(command.includes("open google")){

speak("Opening Google, Boss")

window.open("https://google.com","_blank")

}

else if(command.includes("open whatsapp")){

speak("Opening WhatsApp Web, Boss")

window.open("https://web.whatsapp.com","_blank")

}

else if(command.includes("time")){

const time = new Date().toLocaleTimeString()

speak("The time is " + time + ", Boss")

}

else if(command.includes("date")){

const date = new Date().toDateString()

speak("Today is " + date + ", Boss")

}

else if(command.includes("search")){

let search = command.replace("search","")

speak("Searching Google for " + search)

window.open(`https://www.google.com/search?q=${search}`)

}

else if(command.includes("play")){

let video = command.replace("play","")

speak("Playing " + video + " on YouTube")

window.open(`https://www.youtube.com/results?search_query=${video}`)

}

else{

speak("I'm still learning, Boss")

}

}

</script>

</body>
</html>
